<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number</title>
</head>
<body>
    <script type="text/javascript">
        const x = new Number("1234");
        const y = Number(678);
        console.info(x);
        console.info(y);
        console.info(x === 1234); // false
        console.info(y === 678); // false
        console.info(x instanceof Number);
        console.info(y instanceof Number);
        console.info(typeof x);
        console.info(typeof y);


    </script>
</body>
</html>
