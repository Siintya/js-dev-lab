<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERROR</title>
</head>
<body>
    <script type="text/javascript">
        class MathUtil {
            static sum(...numbers) {
                if (numbers.length <= 1) {
                    // Throw Error
                    throw new Error("Total parameter harus lebih dari 0");
                }

                let result = 0;
                for (const number of numbers) {
                    result += number;
                }
                return result;
            }
        }

        console.info(MathUtil.sum()); // result ERROR
        console.info(MathUtil.sum(1,2,3,4,5));
    </script>
</body>
</html>
