<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class: Public Field</title>
</head>
<body>
    <script type="text/javascript">
        // public class field 
        class Customer {
            firstName;
            lastName;
            balance = 0;

            constructor(firstName, lastName) {
                this.firstName = firstName;
                this.lastName = lastName;
            }
        }

        const budi = new Customer("Budi", "Nugraha");
        console.info(budi);

        
    </script>
</body>
</html>
