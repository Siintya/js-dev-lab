<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #22</title>
</head>
<body>
    <!-- typeof Operator 
    Adalah operator yang digunakan untuk mengetahui tipe data 
    dari sebuah nilai atau variabel.
    -->
    <script>
        let x = 5;
        let y = "Hello";
        let z = true;
        let a = null;
        let b;
        let c = { name: "John" };
        let d = [1, 2, 3];

        if (typeof x === "number") {
            document.write("x adalah sebuah number<br>");
        } 
        if (typeof y === "string") {
            document.write("y adalah sebuah string<br>");
        }
        if (typeof z === "boolean") {
            document.write("z adalah sebuah boolean<br>");
        }
        if (typeof a === "object") {
            document.write("a adalah sebuah object<br>");
        }
        if (typeof b === "undefined") { 
            document.write("b adalah sebuah undefined<br>");
        }
        if (typeof c === "object") {
            document.write("c adalah sebuah object<br>");
        }
        if (typeof d === "object") {
            document.write("d adalah sebuah object<br>");
        }   
    </script>
</body>
</html>
