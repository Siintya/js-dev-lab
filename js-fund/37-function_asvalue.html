<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #37</title>
</head>
<body>
    <!-- Function as Value 
    Function as Value adalah konsep dimana fungsi dapat diperlakukan 
    sbg nilai, yg berarti function bisa disimpan dlm variable, bisa
    juga dikirim melalui parameter ke fungsi lain, atau bahkan bisa 
    dikembalikan dari fungsi lain. 
    --- Fungsi sebagai nilai memungkinkan kita untuk menggunakan fungsi
        dlm cara yg lebih fleksibel, seperti menyimpan fungsi dlm array
        atau objek, atau bahkan membuat fungsi baru berdasarkan fungsi yg 
        sudah ada.
    -->
    <script type="text/javascript">
        // Function di Variable
        function sayHello(name) {
            document.writeln(`Hello, ${name}!<br>`);
        }

        let say = sayHello;
        sayHello("Devy");
        say("Tono");

        // Function di Parameter
        function giveMeName(callback) {
            callback("Siti");
        }
        giveMeName(sayHello);
        giveMeName(say);
    </script>
</body>
</html>
