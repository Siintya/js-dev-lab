<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #56</title>
</head>
<body>
    <!-- Debugger 
    Debugging adalah proses mencari bug (masalah) yang biasa 
    terjadi di kode program kita. Dengan debugger kita bisa menghentikan 
    kode program di posisi yang kita inginkan (breakpoint), 
    lalu melihat semua isi variable yang ada pada saat 
    kode program sedang berhenti.
    -->
    <script type="text/javascript">
        // jika pake `debugger`, hasilnya: Paused in debugger
        // lalu liat di bagian Soucers pada inspect
        function createName(firstName, middleName, lastName) {
            debugger;
            const fullName = `${firstName} ${middleName} ${lastName}`;
            return fullName;
        }
        createName("Devvy", "Putri", "Kusuma");
    </script>
</body>
</html>
