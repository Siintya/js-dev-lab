<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #19</title>
</head>
<body>
    <!-- Type Data Undefined 
    Adalah tipe data yang menunjukkan bahwa sebuah variabel belum 
    memiliki nilai atau belum didefinisikan.
    Variabel yang dideklarasikan tetapi tidak diinisialisasi 
    akan memiliki nilai undefined secara default.
    -->

    <script type="text/javascript">
        let a; // Variabel a dideklarasikan tetapi tidak diinisialisasi
        document.writeln("Nilai a: " + a); // Output: Nilai a: undefined    
        document.writeln("<br>");
        // Memeriksa apakah variabel a adalah undefined
        document.writeln("Apakah a adalah undefined? " + (a === undefined)); //
    </script>
</body>
</html>
