<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #31</title>
</head>
<body>
    <!-- Break and Continue
    Break dan continue adalah dua perintah yang digunakan 
    dalam loop untuk mengontrol alur eksekusi.
    Break digunakan untuk keluar dari loop secara keseluruhan, 
    sedangkan continue digunakan untuk melewati satu iterasi 
    dan melanjutkan ke iterasi berikutnya.
    -->
    <script type="text/javascript">
        // Contoh penggunaan break
        for (let i = 1; i <= 10; i++) {
            if (i === 5) {
                break; // Keluar dari loop ketika i sama dengan 5
            }
            document.write(i + " ");
        }
        document.write("<br>");

        // Contoh penggunaan continue
        for (let j = 1; j <= 10; j++) {
            if (j % 2 === 0) {
                continue; // Melewati iterasi ketika j adalah angka genap
            }
            document.write(j + " ");
        }
    </script>   
</body>
</html>
