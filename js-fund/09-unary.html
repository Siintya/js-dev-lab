<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #9</title>
</head>
<body>
    <!-- Operator Unary 
    Adalah operator yang hanya menerima satu operand. Operator unary yang umum digunakan dalam JavaScript meliputi:
    - Increment (++): menambahkan 1 ke nilai variabel.
    - Decrement (--): mengurangi 1 dari nilai variabel.
    - Negasi (-): mengubah tanda dari nilai variabel.
    - Positif (+): mengubah nilai variabel menjadi positif.
    -->
    <script type="text/javascript">
        let a = 10;

        // Increment
        a++; // a = a + 1
        document.writeln("Increment: " + a); 
        document.writeln("<br>");

        // Decrement
        a--; // a = a - 1
        document.writeln("Decrement: " + a); 
        document.writeln("<br>");

        // Negasi
        let negation = -a; 
        document.writeln("Negasi: " + negation); 
        document.writeln("<br>");

        // Positif
        let positive = +a; 
        document.writeln("Positif: " + positive);
    </script>
</body>
</html>
