<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #8</title>
</head>
<body>
    <!-- Operator Augmented Assignments 
    Adalah operator yang digunakan untuk melakukan operasi matematika dan
    penugasan dalam satu langkah. Operator augmented assignments yang umum digunakan dalam JavaScript meliputi:
    - Penjumlahan dan penugasan (+=): menambahkan nilai ke variabel dan menyimpan hasilnya kembali ke variabel tersebut.
    - Pengurangan dan penugasan (-=): mengurangi nilai dari variabel dan menyimpan hasilnya kembali ke variabel tersebut.
    - Perkalian dan penugasan (*=): mengalikan nilai variabel dengan nilai lain dan menyimpan hasilnya kembali ke variabel tersebut.
    - Pembagian dan penugasan (/=): membagi nilai variabel dengan nilai lain dan menyimpan hasilnya kembali ke variabel tersebut.
    - Modulus dan penugasan (%=): mendapatkan sisa hasil bagi dari pembagian variabel dengan nilai lain dan menyimpan hasilnya kembali ke variabel tersebut.    
    -->
    <script type="text/javascript">
        let a = 10;

        // Penjumlahan dan penugasan
        a += 5; // a = a + 5
        document.writeln("Penjumlahan dan penugasan: " + a); 
        document.writeln("<br>");

        // Pengurangan dan penugasan
        a -= 3; // a = a - 3
        document.writeln("Pengurangan dan penugasan: " + a); 
        document.writeln("<br>");

        // Perkalian dan penugasan
        a *= 2; // a = a * 2
        document.writeln("Perkalian dan penugasan: " + a); 
        document.writeln("<br>");

        // Pembagian dan penugasan
        a /= 4; // a = a / 4
        document.writeln("Pembagian dan penugasan: " + a); 
        document.writeln("<br>");

        // Modulus dan penugasan
        a %= 3; // a = a % 3
        document.writeln("Modulus dan penugasan: " + a);
    </script>
</body>
</html>
