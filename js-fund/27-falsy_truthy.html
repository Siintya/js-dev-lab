<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #27</title>
</head>
<body>
    <!-- Falsy (Falsey) and Truthy Values 
    Falsy (Falsey) adalah nilai yang dianggap sebagai false dalam konteks boolean,
    sedangkan Truthy adalah nilai yang dianggap sebagai true dalam konteks boolean.
    Berikut adalah daftar nilai yang dianggap Falsy (Falsey) dalam JavaScript:
    1. false
    2. 0 (angka nol)
    3. -0 (angka negatif nol)
    4. 0n (BigInt nol)
    5. "" (string kosong)
    6. null
    7. undefined
    8. NaN (Not a Number)
    Semua nilai lainnya dianggap Truthy, termasuk:
    1. true
    2. Angka selain 0 (misalnya, 1, -1, 3.14, dll.)
    3. String yang tidak kosong (misalnya, "Hello", "0", "false", dll.)
    4. Objek (misalnya, {}, [], function() {}, dll.)
    5. Symbol (misalnya, Symbol("foo"), dll.)
    6. BigInt selain 0n (misalnya, 1n, -1n, dll.)
    -->
    <script>
        let value1 = false;
        let value2 = 1;
        let value3 = "";
        let value4 = "foo";
        let value5 = undefined;
        let value6 = NaN;

        if (value1) {
            document.write("value1 adalah Truthy<br>");
        } else {
            document.write("value1 adalah Falsy<br>");
        }

        if (value2) {
            document.write("value2 adalah Truthy<br>");
        } else {
            document.write("value2 adalah Falsy<br>");
        }

        if (value3) {
            document.write("value3 adalah Truthy<br>");
        } else {
            document.write("value3 adalah Falsy<br>");
        }

        if (value4) {
            document.write("value4 adalah Truthy<br>");
        } else {
            document.write("value4 adalah Falsy<br>");
        }

        if (value5) {
            document.write("value5 adalah Truthy<br>");
        } else {
            document.write("value5 adalah Falsy<br>");
        }

        if (value6) {
            document.write("value6 adalah Truthy<br>");
        } else {
            document.write("value6 adalah Falsy<br>");
        }    
    </script>
</body>
</html>
