<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #20</title>
</head>
<body>
    <!-- Type Data Null 
    Adalah tipe data yang menunjukkan bahwa sebuah variabel 
    memiliki nilai kosong atau tidak memiliki nilai.
    Null berbeda dengan undefined, karena null adalah 
    nilai yang diberikan secara eksplisit, sedangkan undefined adalah 
    nilai default dari variabel yang belum diinisialisasi.
    -->
    <script type="text/javascript">
        let a = null; // Variabel a diinisialisasi dengan nilai null
        document.writeln("Nilai a: " + a); // Output: Nilai a: null    
        document.writeln("<br>");
        // Memeriksa apakah variabel a adalah null
        document.writeln("Apakah a adalah null? " + (a === null)); // Output: Apakah a adalah null? true
    </script>
</body>
</html>
