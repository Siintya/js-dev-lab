<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #4</title>
</head>
<body>
    <!-- Type Data Boolean (Boolean)
    Adalah tipe data yang hanya dapat memiliki dua nilai, yaitu true (benar) atau false (salah).
    Boolean digunakan untuk melakukan perbandingan dan kontrol alur program.
    -->
    <script type="text/javascript">
        document.writeln(true);  // true
        document.writeln("<br>"); 
        document.writeln(false); // false
    </script>
</body>
</html>
