<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #2</title>
</head>
<body>
    <!-- Comment (Komentar)
    Adalah bagian dari kode yang tidak akan dieksekusi 
    oleh browser, namun digunakan untuk memberikan penjelasan 
    atau catatan kepada pembaca kode.
    -->
    <script type="text/javascript">
        // komentar satu baris
        document.writeln("<p>Hello World</p>");
        /*
        Multiline adalah komentar
        yang terdiri dari beberapa baris
        */
        document.writeln("<p>Hello World Again!</p>");

    </script>
</body>
</html>
