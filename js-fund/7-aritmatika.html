<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #7</title>
</head>
<body>
    <!-- Operator Aritmatika 
    Adalah simbol yang digunakan untuk melakukan operasi matematika pada nilai atau variabel.
    Operator aritmatika yang umum digunakan dalam JavaScript meliputi:
    - Penjumlahan (+): menjumlahkan 2 nilai atau lebih.
    - Pengurangan (-): mengurangi 1 nilai dari nilai lainnya.
    - Perkalian (*): mengalikan 2 nilai atau lebih.
    - Pembagian (/): membagi 1 nilai dengan nilai lainnya.
    - Modulus (%): mendapatkan sisa hasil bagi dari pembagian 2 nilai.
    - Eksponen (**): menghitung pangkat dari suatu nilai.
    -->
    <script type="text/javascript">
        let a = 40;
        let b = 5;

        // Penjumlahan
        let sum = a + b; 
        document.writeln("Penjumlahan: " + sum); 
        document.writeln("<br>");

        // Pengurangan
        let difference = a - b; 
        document.writeln("Pengurangan: " + difference); 
        document.writeln("<br>");

        // Perkalian
        let multiple = a * b; 
        document.writeln("Perkalian: " + multiple); 
        document.writeln("<br>");

        // Pembagian
        let division = a / b; 
        document.writeln("Pembagian: " + division); 
        document.writeln("<br>");

        // Modulus
        let modulus = a % b; 
        document.writeln("Modulus: " + modulus); 
        document.writeln("<br>");

        // Eksponen
        let exponentiation = a ** b; 
        document.writeln("Eksponen: " + exponentiation);
    </script>
</body>
</html>
