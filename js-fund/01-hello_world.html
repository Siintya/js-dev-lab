<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #1</title>
</head>
<body>
    <!-- 
    diJS tanda ; (titik koma) tidak wajib, namun disarankan untuk 
    digunakan untuk memisahkan antara satu statement dengan statement 
    lainnya.
    -->
    <script type="text/javascript">
        document.writeln("Hello World");
    </script>
    <br>
    <!-- include di dalam file HTML dengan menggunakan 
        tag <script> dan atribut src untuk menunjuk ke file 
        JavaScript eksternal 
    -->
    <script type="text/javascript" src="js/hello_world.js"></script>
</body>
</html>
