<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #3</title>
</head>
<body>
    <!-- Type Data Number (Angka)
    Adalah tipe data yang digunakan untuk menyimpan nilai numerik,
    baik bilangan bulat (integer) maupun bilangan desimal (floating-point).
    Javascript mendukung number notation untuk menulis angka dalam format 
    yang lebih mudah dibaca, seperti:
    - Bilangan bulat: 100, -50, 0
    - Bilangan desimal: 3.14, -0.001, 2.71828
    -->
    <script type="text/javascript">
        document.writeln(100); // bilangan bulat
        document.writeln("<br>"); 
        document.writeln(100.5); // bilangan desimal

    </script>
</body>
</html>
