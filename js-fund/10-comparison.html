<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #10</title>
</head>
<body>
    <!-- Operator Perbandingan
    Adalah operator yang digunakan untuk membandingkan dua nilai. 
    Operator perbandingan yang umum digunakan dalam JavaScript meliputi:
    - Sama dengan (==): memeriksa apakah dua nilai sama.
    - Tidak sama dengan (!=): memeriksa apakah dua nilai tidak sama.
    - Sama dan memiliki tipe data yang sama (===): memeriksa apakah dua nilai dan tipe data mereka sama.
    - Tidak sama dan memiliki tipe data yang berbeda (!==): memeriksa apakah dua nilai atau tipe data mereka berbeda.
    - Lebih besar dari (>): memeriksa apakah nilai pertama lebih besar dari nilai kedua.
    - Lebih kecil dari (<): memeriksa apakah nilai pertama lebih kecil dari nilai kedua.
    - Lebih besar atau sama dengan (>=): memeriksa apakah nilai pertama lebih besar atau sama dengan nilai kedua.
    - Lebih kecil atau sama dengan (<=): memeriksa apakah nilai pertama lebih kecil atau sama dengan nilai kedua.
    -->
    <script type="text/javascript">
        let a = 10;
        let b = 20;

        // Sama dengan
        document.writeln(a + " == " + b + " : " + (a == b)); 
        document.writeln("<br>");

        // Tidak sama dengan
        document.writeln(a + " != " + b + " : " + (a != b)); 
        document.writeln("<br>");

        // Sama dan memiliki tipe data yang sama
        document.writeln(a + " === " + b + " : " + (a === b)); 
        document.writeln("<br>");

        // Tidak sama dan memiliki tipe data yang berbeda
        document.writeln(a + " !== " + b + " : " + (a !== b)); 
        document.writeln("<br>");

        // Lebih besar dari
        document.writeln(a + " > " + b + " : " + (a > b)); 
        document.writeln("<br>");

        // Lebih kecil dari
        document.writeln(a + " < " + b + " : " + (a < b)); 
        document.writeln("<br>");

        // Lebih besar atau sama dengan
        document.writeln(a + " >= " + b + " : " + (a >= b)); 
        document.writeln("<br>");

        // Lebih kecil atau sama dengan
        document.writeln(a + " <= " + b + " : " + (a <= b));
    </script>
</body>
</html>
