<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #6</title>
</head>
<body>
    <!-- Type Data Variable (Variable)
    - Adalah tempat untuk menyimpan data atau nilai yg dapat berubah selama program berjalan.
    - Variabel dapat menyimpan berbagai jenis data, seperti angka, string, boolean, objek, dll.
    - Variabel digunakan untuk menyimpan informasi yang dapat digunakan dan dimanipulasi dalam program.
    -->
    <script type="text/javascript">
        // #Mendeklarasikan Variabel
        /*
        - var digunakan untuk variabel yang nilainya dapat berubah (mutable) dan memiliki cakupan fungsi (function scope).
        - let digunakan untuk variabel yang nilainya dapat berubah (mutable).
        - const digunakan untuk variabel yang nilainya tetap (immutable) setelah diinisialisasi
        */ 
        var name = "John Doe";
        let age = 30;          
        const isStudent = true; 

        // #Menampilkan Nilai Variabel
        document.writeln("Name: " + name);
        document.writeln("<br>");
        document.writeln("Age: " + age);
        document.writeln("<br>");
        document.writeln("Is Student: " + isStudent);

        document.writeln("<br>");
        // #Mengubah Nilai Variabel
        var name;

        name = "Jane Smith"; 
        age = 25;
        // isStudent = false; // Error: Cannot reassign a constant variable
        document.writeln("Updated Name: " + name);
        document.writeln("<br>");
        document.writeln("Updated Age: " + age);  
        document.writeln("<br>");

        // const
        const PI = 3.14;
        PI = 3.14159; // Error: Cannot reassign a constant variable
        document.writeln("PI: " + PI);


    </script> 
</body>
</html>
