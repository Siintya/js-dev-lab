<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #5</title>
</head>
<body>
    <!-- Type Data String (String)
    Adalah tipe data yang digunakan untuk menyimpan teks atau kumpulan 
    karakter. String dalam JavaScript dapat ditulis dg menggunakan 
    tanda kutip tunggal ('), tanda kutip ganda ("), 
    atau tanda backtick (`).
    -->
    <script type="text/javascript">
        document.writeln("Hello, World!"); // String dg tanda kutip ganda
        document.writeln('<p>Hello, World!</p>'); // String dg tanda kutip tunggal
        document.writeln(`Hello, World!`); // String dg tanda backtick
        document.writeln("<br>");

        // #Menambah String
        document.writeln("Nama: " + "John Doe"); 
        document.writeln("<br>");
        
        // #Escape Character
        document.writeln("<br>");
        // \n => New Line (Enter)
        document.writeln("Hello,\nWorld!"); 
        
        document.writeln("<br>");
        // \t => Tab
        document.writeln("Hello,\tWorld!"); 

        document.writeln("<br>");
        // \' => Single Quote
        document.writeln('It\'s a nice day!');

        document.writeln("<br>");
        // \" => Double Quote
        document.writeln("She said, \"Hello!\""); 

        document.writeln("<br>");
        // \ => Backslash
        document.writeln("C:\\Users\\JohnDoe"); 
    
    </script>
</body>
</html>
