<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #51</title>
</head>
<body>
    <!-- Destructuring
    adalah  fitur yg bisa digunakan untuk membongkar value-value di array
    atau object ke dalam variable-variable
    Fitur ini sangat mempermudah kita ketika ingin mengambil data dari
    array atau object tanpa harus melakukan pengambilan data satu persatu.
    -->
    <script type="text/javascript">
        const person = [
            "Doni",
            "Mulyadi",
            "Totok",
            "Tito",
            "Devi"
        ];

        // biasanya cara ambil data array
        // const firstPerson = person[0];
        // const middlePerson = person[1];
        // const lastPerson = person[2];

        // destructuring di array
        const [firstPerson, middlePerson, lastPerson, ...others] = person;

        // display
        console.info(firstPerson);
        console.info(middlePerson);
        console.info(lastPerson);
        console.info(others);

        // destructuring di Object
        {
            const data = {
                firstName: "Budi",
                lastName: "Yanto",
                fullName: (firstname, lastname) => {
                    return `Fullname: ${firstName} ${lastName}`;
                },
                address: {
                    street: "Jl. Manggan No. 123",
                    city: "Jakarta",
                    country: "Indonesia",
                },
                gender: "Laki-laki",
                hobby: "Hiking",
                jobs: "Programmer"
            }
            // const {fullName, address,  ...others} = data;
            
            // destructuring nested object
            const {firstName, lastName, address: {street, city, country},  ...others} = data;
            console.info(firstName);
            console.info(lastName);
            // console.info(address);
            console.info(street);
            console.info(city);
            console.info(country);
            console.info(others);
        }
        
    </script>
</body>
</html>
