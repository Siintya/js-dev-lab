<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #11</title>
</head>
<body>
    <!-- Operator Logika
    Adalah operator yang digunakan untuk melakukan operasi logika pada nilai boolean.
    Operator logika yang umum digunakan dalam JavaScript meliputi:
    - AND (&&): mengembalikan true jika kedua operand bernilai true.
    - OR (||): mengembalikan true jika salah satu operand bernilai true.
    - NOT (!): mengembalikan true jika operand bernilai false dan sebaliknya.
    -->
    <script type="text/javascript">
        let a = true;
        let b = false;

        // AND
        document.writeln(a + " && " + b + " : " + (a && b)); 
        document.writeln("<br>");

        // OR
        document.writeln(a + " || " + b + " : " + (a || b)); 
        document.writeln("<br>");

        // NOT
        document.writeln("!a : " + (!a)); 
        document.writeln("<br>");
        document.writeln("!b : " + (!b));
    </script>
</body>
</html>
