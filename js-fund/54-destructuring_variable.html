<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #54</title>
</head>
<body>
    <!-- Destructuring: Menggunakan nama variable lain 
    *** Saat melakukan destructuring di Array, kita bisa dengan 
        mudah membuat nama variable sesuka kita.
    *** Namun pada saat melakukan destructuring, kita harus membuat 
        nama variable sama dengan nama property.
    *** Kita juga bisa menggunakan nama variable lain saat 
        melakukan destructuring object jika kita mau.
    -->
    <script type="text/javascript">
        const names = {
            firstName: "Hindia",
            lastName: "Baskara"
        };

        const {
            firstName: namaDepan, 
            middleName: namaTengah = "Putra", 
            lastName: namaBelakang
        } = names;
        console.info(namaDepan);
        console.info(namaTengah);
        console.info(namaBelakang);
    </script>
</body>
</html>
