<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn JavaScript #12</title>
</head>
<body>
    <!-- Console Log
    Adalah metode yang digunakan untuk menampilkan output atau 
    pesan di konsol pengembang (developer console) pada browser. 
    Console log sangat berguna untuk debugging dan memeriksa nilai 
    variabel selama pengembangan aplikasi JavaScript.
    -->
    <script type="text/javascript">
        console.log("Hello, World!");
        console.info("This is an informational message.");
        console.warn("This is a warning message.");
        console.error("This is an error message.");
        console.table({ name: "John", age: 30, city: "New York" });
    </script>
</body>
</html>
